<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國中英文單字學習網</title>
<style>
  :root{
    --bg:#f3f6fb; --card:#ffffff; --ink:#1f2a44; --muted:#6b7a99;
    --brand:#4f7cff; --brand-d:#3a63e0; --l5:#ff8a5b; --l6:#19b5a3;
    --l1:#5b8def; --l2:#9b6cff; --l3:#ef5da8; --l4:#f0a13a;
    --ok:#22a06b; --bad:#e5484d; --line:#e6ecf5; --shadow:0 8px 24px rgba(31,42,68,.08);
    --tip:#f4b740;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:"Segoe UI","Microsoft JhengHei",system-ui,sans-serif;
    background:linear-gradient(180deg,#eef3fc,#f6f8fc);color:var(--ink);min-height:100vh;min-height:100dvh;overflow-x:hidden}
  header{background:linear-gradient(120deg,#4f7cff,#6a5cff);color:#fff;padding:22px 16px 18px;text-align:center}
  header h1{margin:0;font-size:1.45rem;letter-spacing:.5px}
  header p{margin:6px 0 0;opacity:.92;font-size:.9rem}
  .wrap{max-width:900px;margin:0 auto;padding:16px}
  .tabs{display:flex;gap:6px;justify-content:center;margin:14px 0;flex-wrap:wrap}
  .tab{flex:1;min-width:130px;max-width:200px;padding:11px 8px;border:none;border-radius:14px;background:#e7eefb;
    color:var(--muted);font-size:.98rem;font-weight:700;cursor:pointer;transition:.15s}
  .tab.active{background:var(--brand);color:#fff;box-shadow:var(--shadow)}
  .panel{display:none;animation:fade .25s}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin:10px 0}
  .chip{padding:8px 16px;border-radius:999px;border:2px solid var(--line);background:#fff;
    color:var(--muted);font-weight:700;cursor:pointer;font-size:.92rem;transition:.15s}
  .chip.active{border-color:var(--brand);color:var(--brand);background:#eef3ff}
  .chip.l1.active{border-color:var(--l1);color:var(--l1);background:#eef3ff}
  .chip.l2.active{border-color:var(--l2);color:var(--l2);background:#f4efff}
  .chip.l3.active{border-color:var(--l3);color:var(--l3);background:#fdeef6}
  .chip.l4.active{border-color:var(--l4);color:var(--l4);background:#fdf4e6}
  .chip.l5.active{border-color:var(--l5);color:var(--l5);background:#fff3ec}
  .chip.l6.active{border-color:var(--l6);color:var(--l6);background:#e9faf7}
  /* flashcard */
  .card-stage{perspective:1600px;margin:14px auto;max-width:620px}
  .flash{display:grid;width:100%;cursor:pointer;transition:transform .55s;transform-style:preserve-3d}
  .flash.flip{transform:rotateY(180deg)}
  .face{grid-area:1/1;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border-radius:22px;
    box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 22px;text-align:center;min-height:60vh}
  .face.back{transform:rotateY(180deg);background:linear-gradient(160deg,#fff,#eef3ff);justify-content:flex-start}
  .badge{position:absolute;top:14px;left:14px;font-size:.75rem;font-weight:800;padding:4px 10px;border-radius:999px;color:#fff;z-index:2}
  .badge.L1{background:var(--l1)} .badge.L2{background:var(--l2)} .badge.L3{background:var(--l3)}
  .badge.L4{background:var(--l4)} .badge.L5{background:var(--l5)} .badge.L6{background:var(--l6)}
  .exam .src.L1{background:var(--l1)} .exam .src.L2{background:var(--l2)} .exam .src.L3{background:var(--l3)} .exam .src.L4{background:var(--l4)}
  .emoji{font-size:3.6rem;line-height:1;margin-bottom:8px}
  .emojiBack{font-size:2.2rem;line-height:1;margin-top:8px}
  .en{font-size:2.5rem;font-weight:800;line-height:1.15;word-break:break-word}
  .pos{color:var(--muted);font-size:1rem;margin-top:6px;font-style:italic}
  .zh{font-size:1.7rem;font-weight:800;color:var(--brand-d);margin-top:26px}
  .hint{color:var(--muted);font-size:.82rem;margin-top:14px}
  .speak{margin-top:14px;border:none;background:#eef3ff;color:var(--brand);font-size:1.4rem;
    width:54px;height:54px;border-radius:50%;cursor:pointer}
  .speak:active{transform:scale(.92)}
  .detail{width:100%;margin-top:14px;text-align:left;font-size:.95rem;line-height:1.5}
  .detail .blk{margin:9px 0;padding:10px 12px;border-radius:12px;background:#fff}
  .detail .tip{border-left:4px solid var(--tip);background:#fffaf0}
  .detail .ex{border-left:4px solid var(--brand)}
  .detail .rel{border-left:4px solid var(--l6);background:#effbf9}
  .detail .lbl{font-weight:800;font-size:.8rem;color:var(--muted);display:block;margin-bottom:3px}
  .detail .exen{font-weight:700}
  .detail .exzh{color:var(--muted);font-size:.9rem}
  .miniSpeak{border:none;background:#eef3ff;color:var(--brand);border-radius:8px;cursor:pointer;font-size:.85rem;padding:2px 8px;margin-left:6px}
  .nav{display:flex;gap:10px;justify-content:center;align-items:center;margin:14px 0}
  .btn{border:none;border-radius:14px;padding:12px 20px;font-size:1rem;font-weight:700;cursor:pointer;transition:.15s}
  .btn.primary{background:var(--brand);color:#fff;box-shadow:var(--shadow)}
  .btn.primary:active{transform:translateY(1px)}
  .btn.ghost{background:#e7eefb;color:var(--muted)}
  .btn.sm{padding:9px 14px;font-size:.9rem}
  .counter{font-weight:800;color:var(--muted);min-width:80px;text-align:center}
  .know{display:flex;gap:10px;justify-content:center;margin-top:8px}
  .know .btn{flex:1;max-width:180px}
  /* list */
  .listview{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px}
  .item{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
  .item .top{display:flex;align-items:center;gap:12px}
  .item .dot{width:8px;height:34px;border-radius:6px;flex:0 0 auto}
  .item .w{font-weight:800;font-size:1.1rem}
  .item .m{color:var(--muted);font-size:.92rem}
  .item .sp{margin-left:auto;border:none;background:#eef3ff;color:var(--brand);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1rem;flex:0 0 auto}
  .item .more{margin-top:8px;font-size:.9rem;line-height:1.5;display:none}
  .item.open .more{display:block}
  .item .more .l{font-weight:800;color:var(--muted);font-size:.78rem}
  .item .ex2{color:#33415c} .item .ex2 .z{color:var(--muted)}
  .toggle{font-size:.8rem;color:var(--brand);cursor:pointer;font-weight:700;margin-top:6px;display:inline-block}
  /* quiz */
  .qcfg{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow)}
  .qcfg h3{margin:4px 0 8px;font-size:.95rem;color:var(--muted)}
  .progress{height:10px;background:#e7eefb;border-radius:999px;overflow:hidden;margin:14px 0}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,#4f7cff,#19b5a3);width:0;transition:.3s}
  .qcard{background:#fff;border-radius:20px;padding:22px 18px;box-shadow:var(--shadow);text-align:center}
  .qtype{font-size:.8rem;color:var(--muted);font-weight:700;letter-spacing:1px}
  .qprompt{font-size:2rem;font-weight:800;margin:12px 0 6px;word-break:break-word}
  .qsub{color:var(--muted);margin-bottom:8px}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .opt{padding:16px 12px;border-radius:14px;border:2px solid var(--line);background:#fff;font-size:1.05rem;
    font-weight:700;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--brand)}
  .opt.correct{background:#e7f8ef;border-color:var(--ok);color:var(--ok)}
  .opt.wrong{background:#fdeaea;border-color:var(--bad);color:var(--bad)}
  .opt.dim{opacity:.55}
  .typebox{display:flex;gap:8px;margin-top:14px}
  .typebox input{flex:1;padding:14px;border-radius:14px;border:2px solid var(--line);font-size:1.2rem;text-align:center}
  .feedback{margin-top:14px;font-weight:800;min-height:24px}
  .feedback.ok{color:var(--ok)} .feedback.bad{color:var(--bad)}
  .fbex{font-weight:600;color:var(--muted);font-size:.88rem;margin-top:6px}
  .scorebox{background:#fff;border-radius:20px;padding:26px;box-shadow:var(--shadow);text-align:center}
  .scorebox .big{font-size:3rem;font-weight:900;color:var(--brand)}
  .review{margin-top:14px;text-align:left}
  .review .r{background:#fdf3f3;border-left:4px solid var(--bad);padding:10px 12px;border-radius:8px;margin:6px 0}
  .review .r b{color:var(--bad)}
  select{padding:8px 10px;border-radius:10px;border:2px solid var(--line);font-size:.95rem;font-weight:700;color:var(--ink)}
  .stat{text-align:center;color:var(--muted);font-size:.85rem;margin-top:6px}
  /* exam */
  .exam{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin:10px 0}
  .exam .src{font-size:.78rem;font-weight:800;color:#fff;background:var(--brand);padding:3px 10px;border-radius:999px;display:inline-block}
  .exam .src.L5{background:var(--l5)} .exam .src.L6{background:var(--l6)}
  .exam .q{font-size:1.05rem;font-weight:700;margin:10px 0;line-height:1.5}
  .exam .eopts{display:grid;gap:8px}
  .eopt{padding:12px;border-radius:12px;border:2px solid var(--line);background:#fff;cursor:pointer;font-weight:700;text-align:left;transition:.12s}
  .eopt:hover{border-color:var(--brand)}
  .eopt.correct{background:#e7f8ef;border-color:var(--ok);color:var(--ok)}
  .eopt.wrong{background:#fdeaea;border-color:var(--bad);color:var(--bad)}
  .eopt .k{display:inline-block;width:22px;font-weight:800;color:var(--muted)}
  footer{text-align:center;color:var(--muted);font-size:.78rem;padding:18px}
  @media(max-width:600px){
    .wrap{padding:10px}
    header{padding:16px 12px 14px}
    header h1{font-size:1.2rem}
    header p{font-size:.82rem}
    .tab{min-width:0;font-size:.92rem;padding:11px 4px}
    .chip{padding:8px 13px;font-size:.88rem}
    .card-stage{margin:10px auto}
    .face{min-height:68vh;padding:22px 16px;border-radius:18px}
    .face.back{min-height:auto}
    .en{font-size:2.3rem}
    .emoji{font-size:4.4rem}
    .qprompt{font-size:1.7rem}
    .opts{grid-template-columns:1fr}
    .btn{padding:14px 16px;font-size:1.02rem}
    .detail{font-size:1rem}
  }
</style>
</head>
<body>
<header>
  <h1>📚 國中英文單字學習網</h1>
  <p>多版本單字 ・ 共 <span id="total"></span> 字 ・ 訣竅 + 例句 + 測驗 + 考古題</p>
</header>

<div class="wrap">
  <div class="row" id="groupSel" style="margin:6px 0 2px"></div>
  <div class="tabs">
    <button class="tab active" data-tab="learn">🧠 學習卡</button>
    <button class="tab" data-tab="list">📋 單字表</button>
    <button class="tab" data-tab="quiz">📝 測驗</button>
    <button class="tab" data-tab="exam">📜 考古題</button>
  </div>

  <!-- LEARN -->
  <section class="panel active" id="learn">
    <div class="row" id="learnChips"></div>
    <div class="card-stage">
      <div class="flash" id="flash">
        <div class="face front">
          <span class="badge" id="fb"></span>
          <div class="emoji" id="femoji"></div>
          <div class="en" id="fen"></div>
          <div class="pos" id="fpos"></div>
          <button class="speak" id="fspeak" title="發音">🔊</button>
          <div class="hint">點卡片看中文 + 訣竅 + 例句</div>
        </div>
        <div class="face back">
          <span class="badge" id="bb"></span>
          <div class="emojiBack" id="bemoji"></div>
          <div class="zh" id="fzh"></div>
          <div class="pos" id="bpos"></div>
          <div class="detail" id="fdetail"></div>
          <div class="hint">點卡片翻回英文</div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="btn ghost" id="prev">◀ 上一個</button>
      <span class="counter" id="counter"></span>
      <button class="btn primary" id="next">下一個 ▶</button>
    </div>
    <div class="know">
      <button class="btn ghost sm" id="shuffle">🔀 打亂順序</button>
      <button class="btn primary sm" id="markknown">✅ 我學會了</button>
    </div>
    <div class="stat" id="learnstat"></div>
  </section>

  <!-- LIST -->
  <section class="panel" id="list">
    <div class="row" id="listChips"></div>
    <div class="listview" id="listview"></div>
  </section>

  <!-- QUIZ -->
  <section class="panel" id="quiz">
    <div class="qcfg" id="qcfg">
      <h3>測驗範圍</h3>
      <div class="row" id="quizChips"></div>
      <h3>題型</h3>
      <div class="row">
        <button class="chip active" data-qtype="mix">混合</button>
        <button class="chip" data-qtype="en2zh">看英選中</button>
        <button class="chip" data-qtype="zh2en">看中選英</button>
        <button class="chip" data-qtype="listen">聽音選字</button>
        <button class="chip" data-qtype="cloze">看例句選字</button>
        <button class="chip" data-qtype="spell">看中拼字</button>
        <button class="chip" data-qtype="listenspell">聽英拼字</button>
      </div>
      <h3>題數</h3>
      <div class="row">
        <select id="qnum">
          <option value="10">10 題</option>
          <option value="20" selected>20 題</option>
          <option value="all">全部</option>
        </select>
        <button class="btn primary" id="startquiz">開始測驗 🚀</button>
      </div>
      <div class="stat" id="beststat"></div>
    </div>

    <div id="qrun" style="display:none">
      <div class="progress"><i id="pbar"></i></div>
      <div class="counter" id="qcount" style="text-align:center;margin-bottom:8px"></div>
      <div class="qcard">
        <div class="qtype" id="qtypelabel"></div>
        <div class="qprompt" id="qprompt"></div>
        <div class="qsub" id="qsub"></div>
        <div class="opts" id="qopts"></div>
        <div class="typebox" id="qtypebox" style="display:none">
          <input id="qinput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="輸入英文單字…">
          <button class="btn primary" id="qsubmit">送出</button>
        </div>
        <div class="feedback" id="qfeedback"></div>
        <div class="fbex" id="qfbex"></div>
      </div>
      <div class="nav">
        <button class="btn ghost sm" id="quitquiz">結束</button>
        <button class="btn primary" id="qnext" style="display:none">下一題 ▶</button>
      </div>
    </div>

    <div id="qresult" style="display:none"></div>
  </section>

  <!-- EXAM -->
  <section class="panel" id="exam">
    <div class="row" id="examChips"></div>
    <p class="stat">真實會考／基測／北北基考古題 ・ 點選項作答，立即顯示對錯與正解</p>
    <div id="examlist"></div>
  </section>
</div>

<footer>資料來源：康軒國中英語 2 下 文法即時通 L5 / L6 單字（教用）・ 本網頁可離線使用</footer>

/* ---------- LEARN ---------- */
let learnScope="all", deck=[], idx=0;
const known=new Set(LS.get("known_words",[]));
function buildDeck(){deck=VOCAB.filter(v=>v.group===activeGroup&&(learnScope==="all"||v.lesson===learnScope));idx=0;renderCard();}
function detailHTML(v){
  let h="";
  if(v.def)h+=`<div class="blk ex"><span class="lbl">📖 English Definition <button class="miniSpeak" onclick="speak('${esc(v.def).replace(/'/g,"\\'")}')">🔊</button></span><div class="exen" style="font-weight:600">${esc(v.def)}</div></div>`;
  if(v.tip)h+=`<div class="blk tip"><span class="lbl">💡 使用訣竅</span>${esc(v.tip)}</div>`;
  if(v.ex)h+=`<div class="blk ex"><span class="lbl">📝 例句 <button class="miniSpeak" onclick="speak('${esc(v.ex.en).replace(/'/g,"\\'")}')">🔊</button></span><div class="exen">${esc(v.ex.en)}</div><div class="exzh">${esc(v.ex.zh)}</div></div>`;
  if(v.rel)h+=`<div class="blk rel"><span class="lbl">🔗 衍生／同反義字</span>${esc(v.rel)}</div>`;
  if(v.exam)h+=`<div class="blk tip" style="border-left-color:#9b6cff;background:#f6f1ff"><span class="lbl">📜 ${esc(v.exam.src)}考題</span>${esc(v.exam.q.replace("___","____"))}<br><b>答案：(${"ABCD"[v.exam.ans]}) ${esc(v.exam.opts[v.exam.ans])}</b></div>`;
  return h;
}
function renderCard(){
  const v=deck[idx];if(!v)return;
  $("#flash").classList.remove("flip");
  $("#fb").className="badge";$("#fb").style.background=ucolor(v.lesson);$("#fb").textContent=v.lesson;
  $("#bb").className="badge";$("#bb").style.background=ucolor(v.lesson);$("#bb").textContent=v.lesson;
  $("#femoji").textContent=emo(v.en);$("#bemoji").textContent=emo(v.en);
  $("#fen").textContent=v.en;$("#fpos").textContent=v.pos;
  $("#fzh").textContent=v.zh;$("#bpos").textContent=v.en+"  "+v.pos;
  $("#fdetail").innerHTML=detailHTML(v);
  $("#counter").textContent=(idx+1)+" / "+deck.length;
  const mk=$("#markknown");
  if(known.has(v.en)){mk.textContent="✅ 已學會";mk.classList.remove("primary");mk.classList.add("ghost");}
  else{mk.textContent="✅ 我學會了";mk.classList.add("primary");mk.classList.remove("ghost");}
  $("#learnstat").textContent="已標記學會："+known.size+" 個單字";
}
$("#flash").onclick=e=>{if(e.target.closest('.miniSpeak')||e.target.id==="fspeak")return;$("#flash").classList.toggle("flip");};
$("#fspeak").onclick=e=>{e.stopPropagation();speak(deck[idx].en);};
$("#next").onclick=()=>{idx=(idx+1)%deck.length;renderCard();speak(deck[idx].en);};
$("#prev").onclick=()=>{idx=(idx-1+deck.length)%deck.length;renderCard();};
$("#shuffle").onclick=()=>{deck=shuffle(deck);idx=0;renderCard();};
$("#markknown").onclick=()=>{const v=deck[idx];if(known.has(v.en))known.delete(v.en);else known.add(v.en);LS.set("known_words",[...known]);renderCard();};
function chipRow(box,current,onPick){
  const units=GROUPS[activeGroup].units;box.innerHTML="";
  const mk=(u,label)=>{const b=document.createElement("button");b.className="chip"+(current===u?" active":"");b.textContent=label;
    if(current===u&&u!=="all"){b.style.borderColor=ucolor(u);b.style.color=ucolor(u);}
    b.onclick=()=>onPick(u);box.appendChild(b);};
  mk("all","全部");units.forEach(u=>mk(u,u));
}
function renderLearnChips(){chipRow($("#learnChips"),learnScope,u=>{learnScope=u;renderLearnChips();buildDeck();});}
function renderListChips(){chipRow($("#listChips"),listScope,u=>{listScope=u;renderListChips();renderList();});}
function renderQuizChips(){chipRow($("#quizChips"),qScope,u=>{qScope=u;renderQuizChips();showBest();});}
function renderExamChips(){chipRow($("#examChips"),eScope,u=>{eScope=u;renderExamChips();renderExam();});}
function renderGroupSel(){
  const c=$("#groupSel");c.innerHTML="";
  Object.keys(GROUPS).forEach(k=>{const b=document.createElement("button");b.className="chip"+(activeGroup===k?" active":"");
    b.style.fontWeight="800";b.textContent=GROUPS[k].name;
    if(activeGroup===k){b.style.borderColor="var(--brand)";b.style.color="var(--brand)";b.style.background="#eef3ff";}
    b.onclick=()=>{if(activeGroup===k)return;activeGroup=k;learnScope=listScope=qScope=eScope="all";
      renderGroupSel();renderLearnChips();renderListChips();renderQuizChips();renderExamChips();
      updateTotal();buildDeck();renderList();showBest();renderExam();};
    c.appendChild(b);});
}

        <span class="dot" style="background:${ucolor(v.lesson)}"></span>
        <span style="font-size:1.5rem;flex:0 0 auto">${emo(v.en)}</span>
        <div><div class="w">${esc(v.en)} <span style="color:var(--muted);font-size:.8rem;font-weight:400">${esc(v.pos)}</span></div>
        <div class="m">${esc(v.zh)}</div></div>
        <button class="sp" onclick="event.stopPropagation();speak('${esc(v.en).replace(/'/g,"\\'")}')">🔊</button>
      </div>
      <span class="toggle">▼ 訣竅 / 例句</span>
      <div class="more">
        ${v.def?`<div class="ex2"><span class="l">📖 定義　</span>${esc(v.def)} <button class="sp" style="width:26px;height:26px;font-size:.8rem;display:inline-flex;align-items:center;justify-content:center" onclick="event.stopPropagation();speak('${esc(v.def).replace(/'/g,"\\'")}')">🔊</button></div>`:""}
        ${v.tip?`<div><span class="l">💡 訣竅　</span>${esc(v.tip)}</div>`:""}
        ${v.ex?`<div class="ex2" style="margin-top:4px"><span class="l">📝 例句　</span>${esc(v.ex.en)} <button class="sp" style="width:26px;height:26px;font-size:.8rem;display:inline-flex;align-items:center;justify-content:center" onclick="event.stopPropagation();speak('${esc(v.ex.en).replace(/'/g,"\\'")}')">🔊</button><br><span class="z">${esc(v.ex.zh)}</span></div>`:""}
        ${v.rel?`<div style="margin-top:4px"><span class="l">🔗 衍生　</span>${esc(v.rel)}</div>`:""}
      </div>
    </div>`).join("");
  $$("#listview .item").forEach(it=>{
    const tg=it.querySelector(".toggle");
    tg.onclick=()=>{it.classList.toggle("open");tg.textContent=it.classList.contains("open")?"▲ 收合":"▼ 訣竅 / 例句";};
  });
}
/* list chips rendered by renderListChips() */

/* ---------- QUIZ ---------- */
let qScope="all", qType="mix";
/* quiz scope chips rendered by renderQuizChips() */
$$("[data-qtype]").forEach(c=>c.onclick=()=>{$$("[data-qtype]").forEach(x=>x.classList.remove("active"));c.classList.add("active");qType=c.dataset.qtype;});

let questions=[], qi=0, score=0, wrong=[];
const TYPES=["en2zh","zh2en","listen","spell","cloze","listenspell"];
const TYPELABEL={en2zh:"看英文 → 選中文",zh2en:"看中文 → 選英文",listen:"🔊 聽發音 → 選單字",spell:"看中文 → 拼出英文",cloze:"📖 看例句 → 選單字",listenspell:"🎧 聽發音 → 拼出單字"};
function clozeBlank(v){
  const s=v.ex&&v.ex.en;
  if(!s)return v.def||null;
  const base=v.en.toLowerCase();if(base.includes("..."))return v.def||null;
  const escp=t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  let pat;
  if(base.includes(" "))pat="\\b"+base.split(/\s+/).map(p=>escp(p)+"[a-z]*").join("\\s+")+"\\b";
  else pat="\\b"+escp(base)+"[a-z]*\\b";
  const m=s.match(new RegExp(pat,"i"));
  return m?s.replace(m[0],"＿＿＿＿"):(v.def||null);
}
function makeQuestion(word,pool,type){
  if(type==="spell"||type==="listenspell")return{type,word};
  if(type==="cloze"){
    const blank=clozeBlank(word);
    if(!blank)return makeQuestion(word,pool,"zh2en");
    const distract=sample(pool.filter(v=>v.id!==word.id && v.en!==word.en),3);
    return{type,word,cloze:blank,opts:shuffle([word,...distract])};
  }
  const key=(type==="en2zh")?"zh":"en";
  const distract=sample(pool.filter(v=>v.id!==word.id && v[key]!==word[key]),3);
  return{type,word,opts:shuffle([word,...distract]),key};
}
$("#startquiz").onclick=()=>{
  let scope=VOCAB.filter(v=>v.group===activeGroup&&(qScope==="all"||v.lesson===qScope));
  let qpool=(qType==="cloze")?scope.filter(v=>clozeBlank(v)):scope;
  let n=$("#qnum").value;n=(n==="all")?qpool.length:Math.min(+n,qpool.length);
  const picked=sample(qpool,n);
  questions=picked.map(w=>{const t=(qType==="mix")?TYPES[Math.floor(Math.random()*TYPES.length)]:qType;return makeQuestion(w,scope,t);});
  qi=0;score=0;wrong=[];
  $("#qcfg").style.display="none";$("#qresult").style.display="none";$("#qrun").style.display="block";
  renderQuestion();
};
function renderQuestion(){
  const q=questions[qi];
  $("#pbar").style.width=((qi)/questions.length*100)+"%";
  $("#qcount").textContent="第 "+(qi+1)+" / "+questions.length+" 題　|　得分 "+score;
  $("#qtypelabel").textContent=TYPELABEL[q.type];
  $("#qfeedback").textContent="";$("#qfeedback").className="feedback";$("#qfbex").textContent="";
  $("#qnext").style.display="none";
  const optsBox=$("#qopts"), typeBox=$("#qtypebox");
  $("#qprompt").style.fontSize="";$("#qprompt").style.lineHeight="";$("#qprompt").onclick=null;$("#qprompt").style.cursor="";
  if(q.type==="spell"||q.type==="listenspell"){
    optsBox.style.display="none";typeBox.style.display="flex";
    if(q.type==="listenspell"){
      $("#qprompt").textContent="🔊";$("#qprompt").style.cursor="pointer";$("#qprompt").onclick=()=>speak(q.word.en);
      $("#qsub").textContent="聽發音，拼出單字　（中文："+q.word.zh+"　共 "+q.word.en.replace(/ /g,'').length+" 字母）";
      speak(q.word.en);
    }else{
      $("#qprompt").textContent=q.word.zh;
      $("#qsub").textContent=q.word.pos+"　提示： "+q.word.en[0]+" ___ ("+q.word.en.replace(/ /g,'').length+" 字母)";
    }
    $("#qinput").value="";$("#qinput").disabled=false;setTimeout(()=>$("#qinput").focus(),50);
  }else{
    typeBox.style.display="none";optsBox.style.display="grid";
    if(q.type==="en2zh"){$("#qprompt").textContent=q.word.en;$("#qsub").textContent=q.word.pos;}
    else if(q.type==="zh2en"){$("#qprompt").textContent=q.word.zh;$("#qsub").textContent=q.word.pos;}
    else if(q.type==="cloze"){const byDef=!(q.word.ex&&q.word.ex.en);$("#qprompt").style.fontSize="1.35rem";$("#qprompt").style.lineHeight="1.5";$("#qprompt").textContent=q.cloze;$("#qtypelabel").textContent=byDef?"📖 看定義 → 選單字":"📖 看例句 → 選單字";$("#qsub").textContent=byDef?"依英文定義，選出正確的單字":"依例句語境，選出最適合填入空格的字";}
    else{$("#qprompt").textContent="🔊";$("#qsub").textContent="點下方喇叭再聽一次";speak(q.word.en);}
    optsBox.innerHTML="";
    q.opts.forEach(o=>{const b=document.createElement("button");b.className="opt";
      b.textContent=(q.type==="en2zh")?o.zh:o.en;b.onclick=()=>choose(b,o,q);optsBox.appendChild(b);});
    if(q.type==="listen"){const r=document.createElement("button");r.className="btn ghost sm";r.textContent="🔊 再聽一次";
      r.style.gridColumn="1 / -1";r.onclick=()=>speak(q.word.en);optsBox.appendChild(r);}
  }
}
function choose(btn,opt,q){
  const correct=(opt.id===q.word.id);
  $$("#qopts .opt").forEach(b=>{b.onclick=null;b.classList.add("dim");
    const isAns=(q.type==="en2zh")?b.textContent===q.word.zh:b.textContent===q.word.en;
    if(isAns){b.classList.add("correct");b.classList.remove("dim");}});
  if(correct){btn.classList.add("correct");score++;fb(true,q);}else{btn.classList.add("wrong");wrong.push(q);fb(false,q);}
}
$("#qsubmit").onclick=submitSpell;
$("#qinput").addEventListener("keydown",e=>{if(e.key==="Enter")submitSpell();});
function submitSpell(){
  const q=questions[qi];if($("#qinput").disabled)return;
  const ans=$("#qinput").value.trim().toLowerCase().replace(/\s+/g," ");
  const ok=ans===q.word.en.toLowerCase();$("#qinput").disabled=true;
  if(ok){score++;fb(true,q);}else{wrong.push(q);fb(false,q);}
}
function fb(ok,q){
  speak(q.word.en);
  const f=$("#qfeedback");f.className="feedback "+(ok?"ok":"bad");
  f.textContent=ok?"✅ 答對了！ "+q.word.en+" = "+q.word.zh : "❌ 正確答案： "+q.word.en+" = "+q.word.zh;
  if(q.word.ex)$("#qfbex").textContent="📝 "+q.word.ex.en;
  $("#qcount").textContent="第 "+(qi+1)+" / "+questions.length+" 題　|　得分 "+score;
  $("#qnext").style.display="inline-block";$("#qnext").focus();
}
$("#qnext").onclick=()=>{qi++;if(qi<questions.length)renderQuestion();else finish();};
$("#quitquiz").onclick=()=>{$("#qrun").style.display="none";$("#qcfg").style.display="block";showBest();};
function finish(){
  $("#pbar").style.width="100%";
  const pct=Math.round(score/questions.length*100);
  const key="best_"+activeGroup+"_"+qScope;const best=Math.max(LS.get(key,0),pct);LS.set(key,best);
  let emoji=pct>=90?"🏆":pct>=70?"🎉":pct>=50?"💪":"📖";
  let msg=pct>=90?"太厲害了！":pct>=70?"做得很好！":pct>=50?"繼續加油！":"多練習幾次會更好！";
  $("#qrun").style.display="none";
  const rv=wrong.length?`<div class="review"><h3 style="color:var(--muted)">📌 需要複習的單字（${wrong.length}）</h3>`+
     wrong.map(q=>`<div class="r"><b>${esc(q.word.en)}</b> ${esc(q.word.pos)} — ${esc(q.word.zh)}</div>`).join("")+`</div>`:
     `<p style="color:var(--ok);font-weight:800">🌟 全部答對，太棒了！</p>`;
  $("#qresult").innerHTML=`<div class="scorebox">
     <div style="font-size:3rem">${emoji}</div><div class="big">${score} / ${questions.length}</div>
     <div style="font-weight:800;color:var(--muted)">答對率 ${pct}%　・　${msg}</div>
     <div class="nav" style="margin-top:18px">
       ${wrong.length?'<button class="btn primary" id="retrywrong">🔁 只測錯的題目</button>':''}
       <button class="btn ${wrong.length?'ghost':'primary'}" id="retryall">↻ 再測一次</button>
       <button class="btn ghost" id="backcfg">⚙ 設定</button>
     </div>${rv}</div>`;
  $("#qresult").style.display="block";
  if(wrong.length)$("#retrywrong").onclick=()=>{const pool=VOCAB.filter(v=>qScope==="all"||v.lesson===qScope);questions=shuffle(wrong).map(q=>makeQuestion(q.word,pool,q.type));qi=0;score=0;wrong=[];$("#qresult").style.display="none";$("#qrun").style.display="block";renderQuestion();};
  $("#retryall").onclick=()=>{$("#qresult").style.display="none";$("#startquiz").click();};
  $("#backcfg").onclick=()=>{$("#qresult").style.display="none";$("#qcfg").style.display="block";showBest();};
}
function showBest(){const b=LS.get("best_"+activeGroup+"_"+qScope,0);$("#beststat").textContent=b?("此範圍最佳答對率： "+b+"%"):"還沒有紀錄，開始第一次測驗吧！";}

/* ---------- EXAM ---------- */
let eScope="all";
/* exam scope chips rendered by renderExamChips() */
function renderExam(){
  const arr=VOCAB.filter(v=>v.exam&&v.group===activeGroup&&(eScope==="all"||v.lesson===eScope));
  $("#examlist").innerHTML=arr.map((v,i)=>{
    const e=v.exam;
    return `<div class="exam" data-i="${i}">
      <span class="src ${v.lesson}">${esc(e.src)} ・ ${v.lesson}</span>
      <div class="q">${esc(e.q).replace("___",'<span style="color:var(--brand)">_____</span>')}</div>
      <div class="eopts">${e.opts.map((o,k)=>`<button class="eopt" data-k="${k}"><span class="k">(${"ABCD"[k]})</span>${esc(o)}</button>`).join("")}</div>
    </div>`;
  }).join("")||`<p class="stat">此範圍沒有考古題。</p>`;
  $$("#examlist .exam").forEach((box,i)=>{
    const e=arr[i].exam;
    box.querySelectorAll(".eopt").forEach(btn=>btn.onclick=()=>{
      const k=+btn.dataset.k;
      box.querySelectorAll(".eopt").forEach(b=>b.onclick=null);
      box.querySelectorAll(".eopt")[e.ans].classList.add("correct");
      if(k!==e.ans)btn.classList.add("wrong");
      speak(arr[i].en);
    });
  });
}

/* init */
renderGroupSel();renderLearnChips();renderListChips();renderQuizChips();renderExamChips();
updateTotal();buildDeck();renderList();showBest();
</script>
