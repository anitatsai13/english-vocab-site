<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國中英文單字學習網</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --muted:#6e6e73;
    --brand:#0071e3; --brand-d:#0058b9; --l5:#ff453a; --l6:#30b0c7;
    --l1:#0071e3; --l2:#af52de; --l3:#ff2d55; --l4:#ff9500;
    --ok:#34c759; --bad:#ff3b30; --line:#e5e5ea; --shadow:0 4px 20px rgba(0,0,0,.06);
    --tip:#ff9f0a;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue","PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.01em;
    background:var(--bg);color:var(--ink);min-height:100vh;min-height:100dvh;overflow-x:hidden}
  header{background:#fff;color:var(--ink);padding:34px 16px 26px;text-align:center;border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:1.7rem;letter-spacing:-.02em;font-weight:700}
  header p{margin:8px 0 0;color:var(--muted);font-size:.95rem;font-weight:500}
  .wrap{max-width:900px;margin:0 auto;padding:16px}
  .tabs{display:flex;gap:6px;justify-content:center;margin:14px 0;flex-wrap:wrap}
  .tab{flex:1;min-width:130px;max-width:200px;padding:11px 8px;border:none;border-radius:14px;background:#e8e8ed;
    color:var(--muted);font-size:.98rem;font-weight:700;cursor:pointer;transition:.15s}
  .tab.active{background:var(--brand);color:#fff;box-shadow:var(--shadow)}
  .panel{display:none;animation:fade .25s}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin:10px 0}
  .chip{padding:8px 16px;border-radius:999px;border:2px solid var(--line);background:#fff;
    color:var(--muted);font-weight:700;cursor:pointer;font-size:.92rem;transition:.15s}
  .chip.active{border-color:var(--brand);color:var(--brand);background:#e8f1ff}
  .chip.l1.active{border-color:var(--l1);color:var(--l1);background:#e8f1ff}
  .chip.l2.active{border-color:var(--l2);color:var(--l2);background:#f4efff}
  .chip.l3.active{border-color:var(--l3);color:var(--l3);background:#fdeef6}
  .chip.l4.active{border-color:var(--l4);color:var(--l4);background:#fdf4e6}
  .chip.l5.active{border-color:var(--l5);color:var(--l5);background:#fff3ec}
  .chip.l6.active{border-color:var(--l6);color:var(--l6);background:#e9faf7}
  /* flashcard */
  .card-stage{perspective:1600px;margin:14px auto;max-width:620px}
  .flash{display:grid;width:100%;cursor:pointer;transition:transform .55s;transform-style:preserve-3d}
  .flash.flip{transform:rotateY(180deg)}
  .face{grid-area:1/1;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border-radius:22px;
    box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 22px;text-align:center;min-height:60vh}
  .face.back{transform:rotateY(180deg);background:linear-gradient(160deg,#fff,#f5f5f7);justify-content:flex-start}
  .badge{position:absolute;top:14px;left:14px;font-size:.75rem;font-weight:800;padding:4px 10px;border-radius:999px;color:#fff;z-index:2}
  .badge.L1{background:var(--l1)} .badge.L2{background:var(--l2)} .badge.L3{background:var(--l3)}
  .badge.L4{background:var(--l4)} .badge.L5{background:var(--l5)} .badge.L6{background:var(--l6)}
  .exam .src.L1{background:var(--l1)} .exam .src.L2{background:var(--l2)} .exam .src.L3{background:var(--l3)} .exam .src.L4{background:var(--l4)}
  .emoji{font-size:3.6rem;line-height:1;margin-bottom:8px}
  .emojiBack{font-size:2.2rem;line-height:1;margin-top:8px}
  .en{font-size:2.5rem;font-weight:800;line-height:1.15;word-break:break-word}
  .pos{color:var(--muted);font-size:1rem;margin-top:6px;font-style:italic}
  .zh{font-size:1.7rem;font-weight:800;color:var(--brand-d);margin-top:26px}
  .hint{color:var(--muted);font-size:.82rem;margin-top:14px}
  .speak{margin-top:14px;border:none;background:#e8f1ff;color:var(--brand);font-size:1.4rem;
    width:54px;height:54px;border-radius:50%;cursor:pointer}
  .speak:active{transform:scale(.92)}
  .detail{width:100%;margin-top:14px;text-align:left;font-size:.95rem;line-height:1.5}
  .detail .blk{margin:9px 0;padding:10px 12px;border-radius:12px;background:#fff}
  .detail .tip{border-left:4px solid var(--tip);background:#fffaf0}
  .detail .ex{border-left:4px solid var(--brand)}
  .detail .rel{border-left:4px solid var(--l6);background:#effbf9}
  .detail .lbl{font-weight:800;font-size:.8rem;color:var(--muted);display:block;margin-bottom:3px}
  .detail .exen{font-weight:700}
  .detail .exzh{color:var(--muted);font-size:.9rem}
  .miniSpeak{border:none;background:#e8f1ff;color:var(--brand);border-radius:8px;cursor:pointer;font-size:.85rem;padding:2px 8px;margin-left:6px}
  .nav{display:flex;gap:10px;justify-content:center;align-items:center;margin:14px 0}
  .btn{border:none;border-radius:980px;padding:12px 22px;font-size:1rem;font-weight:600;cursor:pointer;transition:.15s}
  .btn.primary{background:var(--brand);color:#fff;box-shadow:var(--shadow)}
  .btn.primary:active{transform:translateY(1px)}
  .btn.ghost{background:#e8e8ed;color:var(--muted)}
  .btn.sm{padding:9px 14px;font-size:.9rem}
  .counter{font-weight:800;color:var(--muted);min-width:80px;text-align:center}
  .know{display:flex;gap:10px;justify-content:center;margin-top:8px}
  .know .btn{flex:1;max-width:180px}
  /* list */
  .listview{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px}
  .item{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
  .item .top{display:flex;align-items:center;gap:12px}
  .item .dot{width:8px;height:34px;border-radius:6px;flex:0 0 auto}
  .item .w{font-weight:800;font-size:1.1rem}
  .item .m{color:var(--muted);font-size:.92rem}
  .item .sp{margin-left:auto;border:none;background:#e8f1ff;color:var(--brand);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1rem;flex:0 0 auto}
  .item .more{margin-top:8px;font-size:.9rem;line-height:1.5;display:none}
  .item.open .more{display:block}
  .item .more .l{font-weight:800;color:var(--muted);font-size:.78rem}
  .item .ex2{color:#33415c} .item .ex2 .z{color:var(--muted)}
  .toggle{font-size:.8rem;color:var(--brand);cursor:pointer;font-weight:700;margin-top:6px;display:inline-block}
  /* quiz */
  .qcfg{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow)}
  .qcfg h3{margin:4px 0 8px;font-size:.95rem;color:var(--muted)}
  .progress{height:10px;background:#e8e8ed;border-radius:999px;overflow:hidden;margin:14px 0}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,#0071e3,#42a1ff);width:0;transition:.3s}
  .qcard{background:#fff;border-radius:20px;padding:22px 18px;box-shadow:var(--shadow);text-align:center}
  .qtype{font-size:.8rem;color:var(--muted);font-weight:700;letter-spacing:1px}
  .qprompt{font-size:2rem;font-weight:800;margin:12px 0 6px;word-break:break-word}
  .qsub{color:var(--muted);margin-bottom:8px}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .opt{padding:16px 12px;border-radius:14px;border:2px solid var(--line);background:#fff;font-size:1.05rem;
    font-weight:700;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--brand)}
  .opt.correct{background:#e7f8ef;border-color:var(--ok);color:var(--ok)}
  .opt.wrong{background:#fdeaea;border-color:var(--bad);color:var(--bad)}
  .opt.dim{opacity:.55}
  .typebox{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .typebox input{flex:1;min-width:140px;padding:14px;border-radius:14px;border:2px solid var(--line);font-size:1.2rem;text-align:center}
  .feedback{margin-top:14px;font-weight:800;min-height:24px}
  .feedback.ok{color:var(--ok)} .feedback.bad{color:var(--bad)}
  .fbex{font-weight:600;color:var(--muted);font-size:.88rem;margin-top:6px}
  .scorebox{background:#fff;border-radius:20px;padding:26px;box-shadow:var(--shadow);text-align:center}
  .scorebox .big{font-size:3rem;font-weight:900;color:var(--brand)}
  .review{margin-top:14px;text-align:left}
  .review .r{background:#fdf3f3;border-left:4px solid var(--bad);padding:10px 12px;border-radius:8px;margin:6px 0}
  .review .r b{color:var(--bad)}
  select{padding:8px 10px;border-radius:10px;border:2px solid var(--line);font-size:.95rem;font-weight:700;color:var(--ink)}
  .stat{text-align:center;color:var(--muted);font-size:.85rem;margin-top:6px}
  /* exam */
  .exam{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin:10px 0}
  .exam .src{font-size:.78rem;font-weight:800;color:#fff;background:var(--brand);padding:3px 10px;border-radius:999px;display:inline-block}
  .exam .src.L5{background:var(--l5)} .exam .src.L6{background:var(--l6)}
  .exam .q{font-size:1.05rem;font-weight:700;margin:10px 0;line-height:1.5}
  .exam .eopts{display:grid;gap:8px}
  .eopt{padding:12px;border-radius:12px;border:2px solid var(--line);background:#fff;cursor:pointer;font-weight:700;text-align:left;transition:.12s}
  .eopt:hover{border-color:var(--brand)}
  .eopt.correct{background:#e7f8ef;border-color:var(--ok);color:var(--ok)}
  .eopt.wrong{background:#fdeaea;border-color:var(--bad);color:var(--bad)}
  .eopt .k{display:inline-block;width:22px;font-weight:800;color:var(--muted)}
  footer{text-align:center;color:var(--muted);font-size:.78rem;padding:18px}
  @media(max-width:600px){
    .wrap{padding:10px}
    header{padding:16px 12px 14px}
    header h1{font-size:1.2rem}
    header p{font-size:.82rem}
    .tab{min-width:0;font-size:.92rem;padding:11px 4px}
    .chip{padding:8px 13px;font-size:.88rem}
    .card-stage{margin:10px auto}
    .face{min-height:68vh;padding:22px 16px;border-radius:18px}
    .face.back{min-height:auto}
    .en{font-size:2.3rem}
    .emoji{font-size:4.4rem}
    .qprompt{font-size:1.7rem}
    .opts{grid-template-columns:1fr}
    .btn{padding:14px 16px;font-size:1.02rem}
    .detail{font-size:1rem}
  }
  .vtbl{border-collapse:collapse;width:100%;font-size:.95rem}
  .vtbl th,.vtbl td{border:1px solid var(--line);padding:6px 9px;text-align:left}
  .vtbl th{background:#e8f1ff;color:var(--muted);position:sticky;top:0}
  .vtbl .vzh{color:var(--muted);font-size:.85rem}
  .vnum input{padding:8px 10px;border-radius:10px;border:2px solid var(--line);font-size:1.05rem;font-weight:800;width:80px;text-align:center}
  .acct{background:#f5f5f7;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between;align-items:center;font-size:.92rem}
  .acct-form{flex-direction:column;align-items:stretch}
  .acct-form .atitle{font-weight:700;color:var(--muted);margin-bottom:4px}
  .acct-form input{padding:10px;border:2px solid var(--line);border-radius:10px;font-size:1rem}
  .abtns{display:flex;gap:8px;flex-wrap:wrap}
  .acct .btn,.abtns .btn{border:none;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer;background:#e8e8ed;color:var(--muted)}
  .acct .btn.brand,.abtns .btn.brand{background:var(--brand);color:#fff}
  .abtns .btn.ghost{background:#e8e8ed}
  .amsg{font-size:.85rem;margin-top:4px} .amsg.bad{color:var(--bad)} .amsg.ok{color:var(--ok)}
</style>
</head>
<body>
<header>
  <h1>📚 國中英文單字學習網</h1>
  <p>多版本單字 ・ 共 <span id="total"></span> 字 ・ 訣竅 + 例句 + 測驗 + 考古題</p>
</header>

<div class="wrap">
  <div class="row" id="groupSel" style="margin:6px 0 2px"></div>
  <div class="tabs">
    <button class="tab active" data-tab="learn">🧠 學習卡</button>
    <button class="tab" data-tab="list">📋 單字表</button>
    <button class="tab" data-tab="quiz">📝 測驗</button>
    <button class="tab" data-tab="exam">📜 考古題</button>
    <button class="tab" data-tab="verb">🔤 動詞三態</button>
    <button class="tab" data-tab="poly">🔀 一字多義</button>
    <button class="tab" data-tab="wrong">📕 錯題本</button>
  </div>

  <!-- LEARN -->
  <section class="panel active" id="learn">
    <div class="row" id="learnChips"></div>
    <div class="card-stage">
      <div class="flash" id="flash">
        <div class="face front">
          <span class="badge" id="fb"></span>
          <div class="emoji" id="femoji"></div>
          <div class="en" id="fen"></div>
          <div class="pos" id="fpos"></div>
          <button class="speak" id="fspeak" title="發音">🔊</button>
          <div class="hint">點卡片看中文 + 訣竅 + 例句</div>
        </div>
        <div class="face back">
          <span class="badge" id="bb"></span>
          <div class="emojiBack" id="bemoji"></div>
          <div class="zh" id="fzh"></div>
          <div class="pos" id="bpos"></div>
          <div class="detail" id="fdetail"></div>
          <div class="hint">點卡片翻回英文</div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="btn ghost" id="prev">◀ 上一個</button>
      <span class="counter" id="counter"></span>
      <button class="btn primary" id="next">下一個 ▶</button>
    </div>
    <div class="know">
      <button class="btn ghost sm" id="shuffle">🔀 打亂順序</button>
      <button class="btn primary sm" id="markknown">✅ 我學會了</button>
      <button class="btn ghost sm" id="pinbtn">📌 標記不熟</button>
    </div>
    <div class="stat" id="learnstat"></div>
  </section>

  <!-- LIST -->
  <section class="panel" id="list">
    <div class="row" id="listChips"></div>
    <div class="listview" id="listview"></div>
  </section>

  <!-- QUIZ -->
  <section class="panel" id="quiz">
    <div class="qcfg" id="qcfg">
      <h3>測驗範圍(可選多課)</h3>
      <div class="row" id="quizChips"></div>
      <h3>題型</h3>
      <div class="row">
        <button class="chip active" data-qtype="mix">混合</button>
        <button class="chip" data-qtype="en2zh">看英選中</button>
        <button class="chip" data-qtype="zh2en">看中選英</button>
        <button class="chip" data-qtype="listen">聽音選字</button>
        <button class="chip" data-qtype="cloze">看例句選字</button>
        <button class="chip" data-qtype="spell">看中拼字</button>
        <button class="chip" data-qtype="listenspell">聽英拼字</button>
      </div>
      <h3>題數</h3>
      <div class="row">
        <select id="qnum">
          <option value="10">10 題</option>
          <option value="20" selected>20 題</option>
          <option value="all">全部</option>
        </select>
        <button class="btn primary" id="startquiz">開始測驗 🚀</button>
      </div>
      <div class="stat" id="beststat"></div>
    </div>

    <div id="qrun" style="display:none">
      <div class="progress"><i id="pbar"></i></div>
      <div class="counter" id="qcount" style="text-align:center;margin-bottom:8px"></div>
      <div class="qcard">
        <div class="qtype" id="qtypelabel"></div>
        <div class="qprompt" id="qprompt"></div>
        <div class="qsub" id="qsub"></div>
        <div class="opts" id="qopts"></div>
        <div class="typebox" id="qtypebox" style="display:none">
          <input id="qinput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="輸入英文單字…">
          <input id="qinputzh" type="text" autocomplete="off" placeholder="輸入中文意思…" style="display:none">
          <button class="btn primary" id="qsubmit">送出</button>
        </div>
        <div class="feedback" id="qfeedback"></div>
        <div class="fbex" id="qfbex"></div>
      </div>
      <div class="nav">
        <button class="btn ghost sm" id="quitquiz">結束</button>
        <button class="btn primary" id="qnext" style="display:none">下一題 ▶</button>
      </div>
    </div>

    <div id="qresult" style="display:none"></div>
  </section>

  <!-- EXAM -->
  <section class="panel" id="exam">
    <div class="row" id="examChips"></div>
    <p class="stat">真實會考／基測／北北基考古題 ・ 點選項作答，立即顯示對錯與正解</p>
    <div id="examlist"></div>
  </section>
  <section class="panel" id="verb">
    <div class="row">
      <button class="chip active" data-vset="irr">不規則動詞 (100)</button>
      <button class="chip" data-vset="all">全部動詞 (358)</button>
    </div>
    <div class="qcfg">
      <h3>出題範圍(第幾號 → 第幾號)</h3>
      <div class="row vnum">
        第 <input id="vfrom" type="number" min="1" value="1"> 號
        到 <input id="vto" type="number" min="1" value="10"> 號
      </div>
      <div class="stat" id="vrangehint"></div>
      <h3>題型</h3>
      <div class="row">
        <button class="chip active" data-vtype="type3">拼三態</button>
        <button class="chip" data-vtype="zhv">中文↔動詞</button>
        <button class="chip" data-vtype="past2base">過去式→原形</button>
        <button class="chip" data-vtype="past2spell">過去式→拼原形＋中文</button>
        <button class="chip" data-vtype="mix">混合</button>
      </div>
      <div class="row">
        <button class="btn ghost" id="vbrowse">📋 瀏覽此範圍</button>
        <button class="btn primary" id="vquiz">📝 開始測驗</button>
      </div>
    </div>
    <div id="vout" style="margin-top:12px"></div>
  </section>
  <section class="panel" id="poly">
    <div class="row">
      <button class="chip active" data-pset="2up">國中英語 2上</button>
      <button class="chip" data-pset="3up">國中英語 3上</button>
      <button class="chip" data-pset="mix">混合</button>
    </div>
    <div class="qcfg">
      <h3>課別</h3>
      <div class="row" id="plessons"></div>
      <h3>題型</h3>
      <div class="row">
        <button class="chip active" data-ptype="context">看例句 → 選字義</button>
        <button class="chip" data-ptype="word">看字義 → 選單字</button>
        <button class="chip" data-ptype="mix">混合</button>
      </div>
      <div class="row">
        <button class="btn ghost" id="pbrowse">📋 瀏覽此範圍</button>
        <button class="btn primary" id="pquiz">📝 開始測驗</button>
      </div>
    </div>
    <div id="pout" style="margin-top:12px"></div>
  </section>
  <section class="panel" id="wrong"></section>
</div>

<footer>資料來源：康軒國中英語 2 下 文法即時通 L5 / L6 單字（教用）・ 本網頁可離線使用</footer>

<script>
const VOCAB = [
 // ---------- Lesson 1 ----------
 {en:"dress",pos:"n.",zh:"洋裝",lesson:"L1",tip:"一字多義(v.)穿……的服裝；變化 dresses／dressed／dressing。",ex:{en:"Amy bought a fashionable dress for her birthday party.",zh:"Amy 買了一件在她生日派對要穿的時尚洋裝。"},rel:""},
 {en:"on sale",pos:"phr.",zh:"特價",lesson:"L1",tip:"sale 特賣活動；have a (big) sale 大減價；for sale 出售中。",ex:{en:"The clothes in this shop are on sale, so they're cheaper now.",zh:"這間商店的衣服在特價，所以它們現在比較便宜。"},rel:""},

let questions=[], qi=0, score=0, wrong=[];
const TYPES=["en2zh","zh2en","listen","spell","cloze","listenspell"];
const TYPELABEL={en2zh:"看英文 → 選中文",zh2en:"看中文 → 選英文",listen:"🔊 聽發音 → 選單字",spell:"看中文 → 拼出英文",cloze:"📖 看例句 → 選單字",listenspell:"🎧 聽發音 → 拼出單字"};
const EASON_GROUPS=new Set(["eason","wonderskills"]); // 這兩個課程的「看例句」改成拼字作答（不給選項）
function clozeBlank(v){
  const s=v.ex&&v.ex.en;
  if(!s)return v.def||null;
  const base=v.en.toLowerCase();if(base.includes("..."))return v.def||null;
  const escp=t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  let pat;
  if(base.includes(" "))pat="\\b"+base.split(/\s+/).map(p=>escp(p)+"[a-z]*").join("\\s+")+"\\b";
  else pat="\\b"+escp(base)+"[a-z]*\\b";
  const m=s.match(new RegExp(pat,"i"));
  return m?s.replace(m[0],"＿＿＿＿"):(v.def||null);
}
/* ---- 誘答選字：優先挑拼字相似（易混淆）的字 ---- */
function levo(a,b){a=(a||"").toLowerCase();b=(b||"").toLowerCase();var m=a.length,n=b.length,d=[];for(var i=0;i<=m;i++)d[i]=[i];for(var j=0;j<=n;j++)d[0][j]=j;for(var i=1;i<=m;i++)for(var j=1;j<=n;j++){var c=a[i-1]===b[j-1]?0:1;d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c);}return d[m][n];}
function simScore(a,b){a=(a||"").toLowerCase();b=(b||"").toLowerCase();if(!a||!b||a===b)return 0;var maxl=Math.max(a.length,b.length)||1;var s=1-levo(a,b)/maxl;if(a[0]===b[0])s+=0.25;if(a[a.length-1]===b[b.length-1])s+=0.1;if(Math.abs(a.length-b.length)<=1)s+=0.1;return s;}
/* 從 pool 挑 n 個誘答：先同詞性、依英文拼字相似度排序取前段，再隨機取 n 個（key＝顯示/去重欄位） */
function pickDistractors(word,pool,n,key){
  var cand=pool.filter(function(v){return v.id!==word.id && v[key]!==word[key];});
  var samePos=cand.filter(function(v){return v.pos===word.pos;});
  var base=(samePos.length>=n)?samePos:cand;
  var scored=base.map(function(v){return {v:v,s:simScore(v.en,word.en)};}).sort(function(x,y){return y.s-x.s;});
  var uniq=[],seen={};seen[word[key]]=1;
  scored.forEach(function(o){if(!seen[o.v[key]]){seen[o.v[key]]=1;uniq.push(o.v);}});
  var topPool=uniq.slice(0,Math.max(n+3,7));
  return sample(topPool,Math.min(n,topPool.length));
}
function makeQuestion(word,pool,type){
  if(type==="spell"||type==="listenspell")return{type,word};
  if(type==="cloze"){
    const blank=clozeBlank(word);
    if(!blank)return makeQuestion(word,pool,"zh2en");
    if(EASON_GROUPS.has(word.group))return{type,word,cloze:blank,spell:true};
    const distract=pickDistractors(word,pool,3,"en");
    return{type,word,cloze:blank,opts:shuffle([word,...distract])};
  }
  const key=(type==="en2zh")?"zh":"en";
  const distract=pickDistractors(word,pool,3,key);
  return{type,word,opts:shuffle([word,...distract]),key};
}

  let qpool=(qType==="cloze")?scope.filter(v=>clozeBlank(v)):scope;
  if(!qpool.length){alert("目前沒有可測的單字(此範圍或釘選為空)");return;}

};

    else{$("#qprompt").textContent="🔊";$("#qsub").textContent="點下方喇叭再聽一次";speak(q.word.en);}

function choose(btn,opt,q){

    const isAns=(q.type==="en2zh")?b.textContent===q.word.zh:b.textContent===q.word.en;
    if(isAns){b.classList.add("correct");b.classList.remove("dim");}});
  if(correct){btn.classList.add("correct");score++;fb(true,q);}else{btn.classList.add("wrong");wrong.push(q);fb(false,q);}

function zhMatch(input,zh){
  const clean=s=>(s||"").replace(/\s+/g,"").replace(/[()（）.。,，、;；:：\/]/g,"");
  const a=clean(input);if(!a)return false;
  const b=clean(zh);
  if(a===b)return true;
  const segs=String(zh).split(/[、，,;；\/]/).map(x=>clean(x)).filter(Boolean);
  if(segs.includes(a))return true;
  return a.length>=2 && b.includes(a);
}
function submitSpell(){
  const q=questions[qi];if($("#qinput").disabled)return;
  const ans=$("#qinput").value.trim().toLowerCase().replace(/\s+/g," ");
  let ok=ans===q.word.en.toLowerCase();
  if(q.type==="cloze"&&q.spell){ok=ok&&zhMatch($("#qinputzh").value,q.word.zh);$("#qinputzh").disabled=true;}
  $("#qinput").disabled=true;
  if(ok){score++;fb(true,q);}else{wrong.push(q);fb(false,q);}
}
function fb(ok,q){
  speak(q.word.en);
  if(!ok)logMistake({mode:q.type,en:q.word.en,zh:q.word.zh,pos:q.word.pos,group:q.word.group||activeGroup,correct:q.word.en+" = "+q.word.zh});
  const f=$("#qfeedback");f.className="feedback "+(ok?"ok":"bad");
  f.textContent=ok?"✅ 答對了！ "+q.word.en+" = "+q.word.zh : "❌ 正確答案： "+q.word.en+" = "+q.word.zh;
  if(q.word.ex)$("#qfbex").textContent="📝 "+q.word.ex.en;
  $("#qcount").textContent="第 "+(qi+1)+" / "+questions.length+" 題　|　得分 "+score;
  $("#qnext").style.display="inline-block";$("#qnext").focus();
}

function finish(){
  $("#pbar").style.width="100%";
  const pct=Math.round(score/questions.length*100);
  const key="best_"+activeGroup+"_"+qScopeKey();const best=Math.max(LS.get(key,0),pct);LS.set(key,best);
  let emoji=pct>=90?"🏆":pct>=70?"🎉":pct>=50?"💪":"📖";
  let msg=pct>=90?"太厲害了！":pct>=70?"做得很好！":pct>=50?"繼續加油！":"多練習幾次會更好！";
  $("#qrun").style.display="none";
  const rv=wrong.length?`<div class="review"><h3 style="color:var(--muted)">📌 需要複習的單字（${wrong.length}）</h3>`+
     wrong.map(q=>`<div class="r"><b>${esc(q.word.en)}</b> ${esc(q.word.pos)} — ${esc(q.word.zh)}</div>`).join("")+`</div>`:
     `<p style="color:var(--ok);font-weight:800">🌟 全部答對，太棒了！</p>`;
  $("#qresult").innerHTML=`<div class="scorebox">
     <div style="font-size:3rem">${emoji}</div><div class="big">${score} / ${questions.length}</div>
     <div style="font-weight:800;color:var(--muted)">答對率 ${pct}%　・　${msg}</div>
     <div class="nav" style="margin-top:18px">
       ${wrong.length?'<button class="btn primary" id="retrywrong">🔁 只測錯的題目</button>':''}
       <button class="btn ${wrong.length?'ghost':'primary'}" id="retryall">↻ 再測一次</button>
       <button class="btn ghost" id="backcfg">⚙ 設定</button>
     </div>${rv}</div>`;
  $("#qresult").style.display="block";
  if(wrong.length)$("#retrywrong").onclick=()=>{const pool=qPin?VOCAB:VOCAB.filter(v=>v.group===activeGroup);questions=shuffle(wrong).map(q=>makeQuestion(q.word,pool,q.type));qi=0;score=0;wrong=[];$("#qresult").style.display="none";$("#qrun").style.display="block";renderQuestion();};
  $("#retryall").onclick=()=>{$("#qresult").style.display="none";$("#startquiz").click();};
  $("#backcfg").onclick=()=>{$("#qresult").style.display="none";$("#qcfg").style.display="block";showBest();};
}
function qScopeKey(){return qPin?"pin":(qSel.size?[...qSel].sort().join("+"):"all");}

    const e=arr[i].exam;

    });
  });
}

const VSETS={irr:{name:"不規則動詞",data:VERB_IRR},all:{name:"全部動詞",data:VERB_ALL}};
let vset="irr", vtype="type3";
function vData(){return VSETS[vset].data;}
function vMax(){const d=vData();return d[d.length-1][0];}
function vClampInputs(){
  const mx=vMax();
  $("#vfrom").max=mx; $("#vto").max=mx;
  if(+$("#vto").value>mx) $("#vto").value=mx;
  if(+$("#vfrom").value>mx) $("#vfrom").value=1;
  $("#vrangehint").textContent="此組共 "+vData().length+" 個動詞(可選 No.1–"+mx+")";
}
function vRangeArr(){
  const d=vData(), mx=vMax();
  let a=Math.max(1,parseInt($("#vfrom").value)||1), b=Math.min(mx,parseInt($("#vto").value)||mx);
  if(a>b){const t=a;a=b;b=t;}
  return d.filter(r=>r[0]>=a && r[0]<=b);
}
function vsp(w){return "speak('"+String(w).replace(/'/g,"\\'")+"')";}
function speak3(){var a=[].slice.call(arguments).filter(Boolean);try{speechSynthesis.cancel();a.forEach(function(w){var u=new SpeechSynthesisUtterance(w);u.lang="en-US";u.rate=.85;speechSynthesis.speak(u);});}catch(e){}}

const VTL={type3:"看原形 → 拼三態",zh2v:"看中文 → 選動詞",v2zh:"看動詞 → 選中文",past2base:"看過去式 → 選原形",past2spell:"看過去式 → 拼原形＋中文"};

  if(t==="zhv"){ t=(Math.floor(Math.random()*2)?"zh2v":"v2zh"); }

  if(t==="type3" && !(r[4]||r[5])) t="v2zh";

function vDistract(r,byBase,n){
  // 依英文原形拼字相似度挑易混淆的動詞；顯示欄位（原形或中文）去重
  var pool=vData().filter(function(x){return x!==r;});
  var ansDisp=byBase?r[1]:r[6];

}
$$("[data-pset]").forEach(c=>c.onclick=()=>{$$("[data-pset]").forEach(x=>x.classList.remove("active"));c.classList.add("active");pset=c.dataset.pset;pLes="all";renderPolyLessons();pBrowse();});

function pMark(sent,word){
  let s=esc(sent).replace(/&lt;br&gt;/g,"<br>");
  try{const re=new RegExp("\\b("+String(word).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+")\\b","i");
    if(re.test(s))return s.replace(re,'<span style="color:var(--brand);font-weight:800">$1</span>');}catch(e){}
  return s;
}
function pSpeakBtn(t){return '<button class="speak" style="width:38px;height:38px;font-size:1rem" onclick="speak(\''+String(t).replace(/<br>/g,' ').replace(/"/g,'').replace(/'/g,"\\'")+'\')">🔊</button>';}
function pBrowse(){
  const arr=polyPool();
  if(!arr.length){$("#pout").innerHTML='<div class="empty">此範圍沒有資料</div>';return;}
  let h='<div class="stat">共 '+arr.length+' 個一字多義單字</div>';
  arr.forEach(p=>{
    h+='<div class="card" style="margin-bottom:12px"><div class="qprompt" style="font-size:1.5rem;margin:4px 0">'+esc(p.en)+' '+pSpeakBtn(p.en)+'</div>';
    p.senses.forEach((s,i)=>{
      h+='<div style="margin:6px 0"><b style="color:var(--brand)">'+(i+1)+'. '+esc(s.zh)+'</b> <span style="color:var(--muted)">'+esc(s.p)+'</span>';
      if(s.ex)h+='<div class="fbex" style="margin-top:2px">📝 '+pMark(s.ex,p.en)+'</div>';
      h+='</div>';
    });
    if(p.ex)h+='<div class="fbex" style="margin-top:4px">📝 '+pMark(p.ex,p.en)+'</div>';
    h+='</div>';
  });
  $("#pout").innerHTML=h;
}
let pq=[],pqi=0,pscore=0,pwrong=[];
function pHasCtx(p){return p.senses.some(s=>s.ex);}
function pPickType(p){let t=ptype;if(t==="mix")t=(Math.random()<0.5&&pHasCtx(p))?"context":"word";if(t==="context"&&!pHasCtx(p))t="word";return t;}
function pOtherSenses(p,n){const o=[];polyPool().forEach(x=>{if(x.en!==p.en)x.senses.forEach(s=>o.push(s.zh));});return sample([...new Set(o)].filter(z=>p.senses.every(s=>s.zh!==z)),n);}
function pBuild(p){
  const t=pPickType(p);
  if(t==="context"){
    const cand=p.senses.filter(s=>s.ex),s=cand[Math.floor(Math.random()*cand.length)];
    let opts=[...new Set(p.senses.map(x=>x.zh))];
    if(opts.length<4)opts=opts.concat(pOtherSenses(p,4-opts.length));
    opts=[...new Set(opts)].slice(0,4);
    if(opts.indexOf(s.zh)<0)opts[0]=s.zh;
    return {t:"context",p,sense:s,ans:s.zh,opts:shuffle(opts)};
  }
  const s=p.senses[Math.floor(Math.random()*p.senses.length)];
  const pool=polyPool().filter(x=>x.en!==p.en);
  const scored=pool.map(x=>({en:x.en,sc:simScore(x.en,p.en)})).sort((a,b)=>b.sc-a.sc);
  let ds=sample([...new Set(scored.slice(0,Math.max(6,3)).map(o=>o.en))],3);
  if(ds.length<3)ds=ds.concat(sample(pool.map(x=>x.en).filter(e=>e!==p.en&&ds.indexOf(e)<0),3-ds.length));
  return {t:"word",p,sense:s,ans:p.en,opts:shuffle([p.en,...ds])};
}
function pStart(){
  const arr=polyPool();
  if(!arr.length){$("#pout").innerHTML='<div class="empty">此範圍沒有可測的單字</div>';return;}
  newRound();pq=shuffle(arr).map(pBuild);pqi=0;pscore=0;pwrong=[];pRender();
}
function pHead(){return '<div class="progress"><i style="width:'+(pqi/pq.length*100)+'%"></i></div><div class="counter" style="text-align:center;margin-bottom:8px">第 '+(pqi+1)+' / '+pq.length+' 題　|　得分 '+pscore+'</div>';}
function pRender(){
  const q=pq[pqi],p=q.p;
  let h=pHead()+'<div class="qcard">';
  if(q.t==="context"){
    h+='<div class="qtype">🔀 看例句 → 選字義</div>';
    h+='<div class="qprompt" style="font-size:1.3rem;line-height:1.5">'+pMark(q.sense.ex,p.en)+' '+pSpeakBtn(q.sense.ex)+'</div>';
    h+='<div class="qsub">句中 <b>'+esc(p.en)+'</b> 是哪個意思?</div>';
  }else{
    h+='<div class="qtype">🔀 看字義 → 選單字</div>';
    h+='<div class="qprompt" style="font-size:1.6rem">'+esc(q.sense.zh)+' <span style="color:var(--muted);font-size:1rem">'+esc(q.sense.p)+'</span></div>';
    h+='<div class="qsub">選出對應的英文單字</div>';
  }
  h+='<div class="opts" id="popts"></div><div class="feedback" id="pfb"></div></div>';
  h+='<div class="nav"><button class="btn ghost sm" id="pquit">結束</button><button class="btn primary" id="pnext" style="display:none">下一題 ▶</button></div>';
  $("#pout").innerHTML=h;
  const box=$("#popts");
  q.opts.forEach(o=>{const b=document.createElement("button");b.className="opt";b.textContent=o;b.onclick=()=>pChoose(b,o,q);box.appendChild(b);});
  $("#pquit").onclick=pBrowse;
  $("#pnext").onclick=()=>{pqi++;if(pqi<pq.length)pRender();else pFinish();};
}
function pChoose(btn,o,q){
  const ok=(o===q.ans);
  $$("#popts .opt").forEach(b=>{b.onclick=null;b.classList.add("dim");if(b.textContent===q.ans){b.classList.add("correct");b.classList.remove("dim");}});
  if(!ok)btn.classList.add("wrong");
  if(ok)pscore++;else pwrong.push(q);
  speak(q.p.en);
  if(!ok)logMistake({mode:"poly_"+q.t,en:q.p.en,zh:q.ans,pos:q.sense.p,group:q.p.g,correct:q.p.en+" = "+q.ans});
  const f=$("#pfb");f.className="feedback "+(ok?"ok":"bad");
  f.innerHTML=(ok?"✅ 答對了！ ":"❌ 正解： ")+"<b>"+esc(q.p.en)+"</b> = "+esc(q.ans);
  $("#pnext").style.display="inline-block";$("#pnext").focus();
}
function pFinish(){
  const pct=Math.round(pscore/pq.length*100),emoji=pct>=90?"🏆":pct>=70?"🎉":pct>=50?"💪":"📖";
  const rv=pwrong.length?'<div class="review"><h3 style="color:var(--muted)">📌 需複習（'+pwrong.length+'）</h3>'+pwrong.map(q=>'<div class="r"><b>'+esc(q.p.en)+'</b> — '+esc(q.ans)+'</div>').join('')+'</div>':'<p style="color:var(--ok);font-weight:800">🌟 全部答對！</p>';
  $("#pout").innerHTML='<div class="scorebox"><div style="font-size:3rem">'+emoji+'</div><div class="big">'+pscore+' / '+pq.length+'</div><div style="font-weight:800;color:var(--muted)">答對率 '+pct+'%</div><div class="nav" style="margin-top:16px">'+(pwrong.length?'<button class="btn primary" id="pretrywrong">🔁 只測錯的</button>':'')+'<button class="btn '+(pwrong.length?'ghost':'primary')+'" id="pretry">↻ 再測一次</button><button class="btn ghost" id="pback">⚙ 設定</button></div>'+rv+'</div>';
  if(pwrong.length)$("#pretrywrong").onclick=()=>{const w=pwrong.slice();pq=shuffle(w).map(q=>pBuild(q.p));pqi=0;pscore=0;pwrong=[];pRender();};
  $("#pretry").onclick=pStart;
  $("#pback").onclick=()=>{$("#pout").innerHTML="";};
}
